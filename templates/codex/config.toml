# GSD/Pi workstation Codex defaults.
# Copy or merge into ~/.codex/config.toml.

approval_policy = "never"
sandbox_mode = "danger-full-access"
sandbox = "danger-full-access"
model = "gpt-5.6-sol"
model_reasoning_effort = "xhigh"
